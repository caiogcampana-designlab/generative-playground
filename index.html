<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generative Playground</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      display: block;
    }
    .controls {
      margin: 20px;
    }
  </style>
</head>
<body>

<div class="controls">
  <label>Density</label>
  <input type="range" id="density" min="10" max="200" value="80"><br>

  <label>Size</label>
  <input type="range" id="size" min="2" max="20" value="8"><br>

  <label>Speed</label>
  <input type="range" id="speed" min="1" max="10" value="3"><br>

  <button onclick="saveCanvas()">Export PNG</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let width = window.innerWidth;
let height = window.innerHeight;

canvas.width = width;
canvas.height = height;

let particles = [];

function createParticles(count) {
  particles = [];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const magnitude = 0.35 + Math.random() * 0.8;
    particles.push({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: Math.cos(angle) * magnitude,
      vy: Math.sin(angle) * magnitude,
      wander: Math.random() * Math.PI * 2
    });
  }
}

function collideParticles(radius) {
  const minDist = radius * 2;

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const a = particles[i];
      const b = particles[j];

      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const distSq = dx * dx + dy * dy;

      if (distSq === 0 || distSq >= minDist * minDist) {
        continue;
      }

      const dist = Math.sqrt(distSq);
      const nx = dx / dist;
      const ny = dy / dist;

      const overlap = minDist - dist;
      const correction = overlap * 0.5;
      a.x -= nx * correction;
      a.y -= ny * correction;
      b.x += nx * correction;
      b.y += ny * correction;

      const rvx = a.vx - b.vx;
      const rvy = a.vy - b.vy;
      const velAlongNormal = rvx * nx + rvy * ny;

      if (velAlongNormal > 0) {
        continue;
      }

      const restitution = 0.95;
      const impulse = (-(1 + restitution) * velAlongNormal) / 2;
      const ix = impulse * nx;
      const iy = impulse * ny;

      a.vx += -ix;
      a.vy += -iy;
      b.vx += ix;
      b.vy += iy;
    }
  }
}

function draw() {
  ctx.fillStyle = "rgba(17,17,17,0.12)";
  ctx.fillRect(0, 0, width, height);

  const size = Number(document.getElementById("size").value);
  const speed = Number(document.getElementById("speed").value);

  particles.forEach((p, index) => {
    p.wander += 0.02 + speed * 0.0015;
    const chaos = 0.03 + speed * 0.003;
    p.vx += Math.cos(p.wander + index * 0.37) * chaos;
    p.vy += Math.sin(p.wander * 0.83 + index * 0.19) * chaos;

    const maxVelocity = 0.9 + speed * 0.55;
    const velocity = Math.hypot(p.vx, p.vy);
    if (velocity > maxVelocity) {
      const scale = maxVelocity / velocity;
      p.vx *= scale;
      p.vy *= scale;
    }

    p.vx *= 0.996;
    p.vy *= 0.996;

    p.x += p.vx * speed;
    p.y += p.vy * speed;

    if (p.x < size) {
      p.x = size;
      p.vx = Math.abs(p.vx) * 0.98;
    } else if (p.x > width - size) {
      p.x = width - size;
      p.vx = -Math.abs(p.vx) * 0.98;
    }

    if (p.y < size) {
      p.y = size;
      p.vy = Math.abs(p.vy) * 0.98;
    } else if (p.y > height - size) {
      p.y = height - size;
      p.vy = -Math.abs(p.vy) * 0.98;
    }
  });

  collideParticles(size);

  ctx.fillStyle = "#00ffcc";
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

document.getElementById("density").addEventListener("input", (e) => {
  createParticles(Number(e.target.value));
});

window.addEventListener("resize", () => {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
});

function saveCanvas() {
  const link = document.createElement("a");
  link.download = "art.png";
  link.href = canvas.toDataURL();
  link.click();
}

createParticles(80);
draw();
</script>

</body>
</html>
